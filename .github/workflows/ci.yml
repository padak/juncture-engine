name: CI

on:
  push:
    branches: [main, design-phase-*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pandas]"
          pip uninstall -y sqlglotrs || true
      - name: Pytest
        run: pytest -v --cov=juncture --cov-report=term-missing

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,pandas]"
          pip uninstall -y sqlglotrs || true
      - name: Run simple example
        run: |
          cd examples/simple
          mkdir -p data
          juncture run --project . --test
      - name: Run ecommerce example
        run: |
          cd examples/ecommerce
          mkdir -p data
          juncture run --project . --test
